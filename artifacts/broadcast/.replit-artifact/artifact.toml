kind = "web"
previewPath = "/"
title = "Airwave"
version = "1.0.0"
id = "artifacts/broadcast"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24305

[services.development]
run = "pnpm --filter @workspace/broadcast run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/broadcast", "run", "build" ]
publicDir = "artifacts/broadcast/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24305"
BASE_PATH = "/"
