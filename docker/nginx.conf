server {
    listen       3000;
    listen       [::]:3000;
    server_name  _;

    root /app/broadcast/public;
    index index.html;

    # Increase timeouts for long-lived WebSocket connections
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;

    # ----- REST API ---------------------------------------------------------
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ----- WebSocket signalling (WebRTC) ------------------------------------
    location /ws {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ----- Static frontend (React SPA) -------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve pre-compressed assets when available
    gzip_static on;

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
